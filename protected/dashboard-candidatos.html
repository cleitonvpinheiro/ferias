<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Candidatos - RH</title>
    <link rel="stylesheet" href="/rh-styles.css">
    <script src="/lang-switcher.js" defer></script>
</head>
<body data-page="rh-candidatos">
    <div id="navbar-container"></div>
    <script src="/rh-navbar.js"></script>
    <script>renderRHNavbar('candidatos');</script>

    <div class="dashboard-container">
        <div class="page-header">
            <div>
                <h1 class="page-title" data-translate="rh_dash_candidatos_title">Gestão de Candidatos</h1>
                <p class="page-subtitle" data-translate="rh_dash_candidatos_subtitle">Acompanhe o fluxo de recrutamento e seleção</p>
            </div>
        </div>

        <div class="filters-bar">
            <div class="filter-group">
                <label data-translate="rh_dash_candidatos_search_label">Buscar Candidato</label>
                <input type="text" id="searchInput" class="filter-input" placeholder="Nome, email ou cargo..." data-translate="rh_dash_candidatos_search_placeholder" onkeyup="filtrarCandidatos()">
            </div>
            <div class="filter-group">
                <label data-translate="rh_dash_candidatos_filter_label">Filtrar por Vaga/Cargo</label>
                <select id="vagaFilter" class="filter-select" onchange="filtrarCandidatos()">
                    <option value="" data-translate="rh_dash_candidatos_filter_all">Todos os Cargos</option>
                </select>
            </div>
            <div class="filter-group filter-meta">
                 <div class="last-update">
                    <span id="lastUpdate" data-translate="rh_dash_last_update_now">Atualizado agora</span>
                </div>
            </div>
        </div>

        <div id="loading" class="loading-state">
            <div class="loading-icon">⏳</div>
            <div data-translate="rh_dash_candidatos_loading">Carregando candidatos...</div>
        </div>

        <div class="kanban-board" id="kanbanBoard" style="display: none;">
            <!-- Columns generated by JS -->
        </div>
    </div>

    <!-- Modal Detalhes -->
    <div class="modal-overlay" id="modalDetalhes">
        <div class="modal">
            <button class="close-modal" onclick="fecharModal()" style="position: absolute; top: 16px; right: 16px;">&times;</button>
            <div id="modalContent"></div>
        </div>
    </div>

  <footer style="text-align: center; padding: 40px; color: var(--text-secondary); font-size: 0.875rem;">
    <p data-translate="rh_footer">&copy; 2025 Família Madalosso. Acesso Restrito ao RH.</p>
  </footer>

    <script>
        let todosCandidatos = [];
        const getLang = () => {
            try { return localStorage.getItem('app_lang') || 'pt'; } catch { return 'pt'; }
        };
        const t = (key) => {
            const lang = getLang();
            const map = {
                'Novos': { pt: 'Novos', es: 'Nuevos', en: 'New' },
                'Em Análise': { pt: 'Em Análise', es: 'En Análisis', en: 'In Review' },
                'Entrevista': { pt: 'Entrevista', es: 'Entrevista', en: 'Interview' },
                'Entrevista Agendada': { pt: 'Entrevista Agendada', es: 'Entrevista Programada', en: 'Interview Scheduled' },
                'Contratados': { pt: 'Contratados', es: 'Contratados', en: 'Hired' },
                'Arquivados': { pt: 'Arquivados', es: 'Archivados', en: 'Archived' },
                'Nenhum candidato': { pt: 'Nenhum candidato', es: 'Ningún candidato', en: 'No candidates' },
                'Atualizado agora': { pt: 'Atualizado agora', es: 'Actualizado ahora', en: 'Updated just now' },
                'Atualizado às': { pt: 'Atualizado às', es: 'Actualizado a las', en: 'Updated at' }
            };
            return (map[key] && map[key][lang]) || key;
        };
        const colunas = [
            { id: 'recebido', title: t('Novos'), color: 'var(--accent)' },
            { id: 'novo', title: t('Novos'), color: 'var(--accent)' },
            { id: 'visto', title: t('Em Análise'), color: 'var(--text-secondary)' },
            { id: 'entrevista', title: t('Entrevista'), color: 'var(--warning)' },
            { id: 'entrevista_agendada', title: t('Entrevista Agendada'), color: 'var(--warning)' },
            { id: 'contratado', title: t('Contratados'), color: 'var(--success)' },
            { id: 'rejeitado', title: t('Arquivados'), color: 'var(--danger)' }
        ];
        const updateColTitles = () => {
            colunas.forEach(c => {
                if (c.id === 'recebido' || c.id === 'novo') c.title = t('Novos');
                if (c.id === 'visto') c.title = t('Em Análise');
                if (c.id === 'entrevista') c.title = t('Entrevista');
                if (c.id === 'entrevista_agendada') c.title = t('Entrevista Agendada');
                if (c.id === 'contratado') c.title = t('Contratados');
                if (c.id === 'rejeitado') c.title = t('Arquivados');
            });
        };

        function formatDatePtBR(value) {
            const d = new Date(value);
            if (Number.isNaN(d.getTime())) return '-';
            return d.toLocaleDateString('pt-BR');
        }

        function formatDateYMD(value) {
            if (typeof value !== 'string') return formatDatePtBR(value);
            const m = value.match(/^(\d{4})-(\d{2})-(\d{2})/);
            if (!m) return formatDatePtBR(value);
            return `${m[3]}/${m[2]}/${m[1]}`;
        }

        function formatDateTimePtBR(value) {
            const d = new Date(value);
            if (Number.isNaN(d.getTime())) return '-';
            return `${d.toLocaleDateString('pt-BR')} às ${d.toLocaleTimeString('pt-BR')}`;
        }

        async function carregarCandidatos() {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('kanbanBoard').style.display = 'none';
            
            try {
                const res = await fetch('/api/rh/candidatos');
                todosCandidatos = await res.json();
                
                populateVagaFilter();
                renderKanban(todosCandidatos);
                document.getElementById('lastUpdate').innerText = t('Atualizado às') + ' ' + new Date().toLocaleTimeString('pt-BR');
                
                document.getElementById('loading').style.display = 'none';
                document.getElementById('kanbanBoard').style.display = 'flex';
            } catch (e) {
                console.error(e);
                alert('Erro ao carregar dados.');
            }
        }

        function populateVagaFilter() {
            const cargos = [...new Set(todosCandidatos.map(c => c.cargo1 || 'Outros').filter(Boolean))];
            const select = document.getElementById('vagaFilter');
            select.innerHTML = '<option value="">Todos os Cargos</option>';
            cargos.forEach(c => {
                const opt = document.createElement('option');
                opt.value = c;
                opt.textContent = c;
                select.appendChild(opt);
            });
        }

        function filtrarCandidatos() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const cargo = document.getElementById('vagaFilter').value;
            
            const filtrados = todosCandidatos.filter(c => {
                const matchTerm = c.nome.toLowerCase().includes(term) || 
                                  c.email.toLowerCase().includes(term) ||
                                  (c.cargo1 && c.cargo1.toLowerCase().includes(term));
                const matchCargo = !cargo || (c.cargo1 === cargo);
                return matchTerm && matchCargo;
            });
            
            renderKanban(filtrados);
        }

        function renderKanban(lista) {
            const board = document.getElementById('kanbanBoard');
            board.innerHTML = '';
            
            // Colunas visíveis
            const displayCols = [
                { id: 'recebido', title: t('Novos'), color: 'var(--accent)' },
                { id: 'visto', title: t('Em Análise'), color: 'var(--text-secondary)' },
                { id: 'entrevista_agendada', title: t('Entrevista'), color: 'var(--warning)' },
                { id: 'contratado', title: t('Contratados'), color: 'var(--success)' },
                { id: 'rejeitado', title: t('Arquivados'), color: 'var(--danger)' }
            ];

            displayCols.forEach(col => {
                // Mapeia status agrupados se necessário
                const items = lista.filter(c => {
                    if (col.id === 'recebido') return c.status === 'recebido' || c.status === 'novo';
                    if (col.id === 'entrevista_agendada') return c.status === 'entrevista' || c.status === 'entrevista_agendada';
                    return c.status === col.id;
                });
                
                const colDiv = document.createElement('div');
                colDiv.className = 'kanban-column';
                colDiv.innerHTML = `
                    <div class="column-header" style="border-top: 3px solid ${col.color}">
                        <div class="column-title">
                            ${col.title}
                            <span class="count-badge">${items.length}</span>
                        </div>
                    </div>
                    <div class="column-body">
                        ${items.length ? items.map(c => createCardHTML(c)).join('') : `<div class="empty-column">${t('Nenhum candidato')}</div>`}
                    </div>
                `;
                board.appendChild(colDiv);
            });
        }

        function createCardHTML(c) {
            const integracaoRow = (c.status === 'contratado' && c.proximaIntegracao)
                ? `<div class="card-detail-row"><span>🗓️</span> Integração: ${formatDateYMD(c.proximaIntegracao)}</div>`
                : '';
            return `
                <div class="candidate-card" onclick="abrirDetalhes('${c.id}')">
                    <div class="card-header">
                        <span class="card-name">${c.nome}</span>
                        <span class="card-date">${formatDatePtBR(c.createdAt)}</span>
                    </div>
                    <div class="card-details">
                        ${c.cargo1 ? `<div class="card-detail-row"><span>💼</span> ${c.cargo1}</div>` : ''}
                        <div class="card-detail-row"><span>💰</span> ${c.salarioPretendido || 'N/A'}</div>
                        <div class="card-detail-row"><span>📍</span> ${c.cidade}</div>
                        ${integracaoRow}
                    </div>
                </div>
            `;
        }

        async function abrirDetalhes(id) {
            const modal = document.getElementById('modalDetalhes');
            const content = document.getElementById('modalContent');
            content.innerHTML = '<div style="padding:40px; text-align:center;">Carregando...</div>';
            modal.style.display = 'flex';

            try {
                // Se já temos os dados básicos, podemos mostrar algo, mas melhor buscar completo para garantir
                const res = await fetch(`/api/rh/candidatos/${id}`);
                const c = await res.json();
                
                renderModalContent(c);
            } catch (e) {
                content.innerHTML = '<div style="color:var(--danger); text-align:center; padding: 40px;">Erro ao carregar detalhes.</div>';
            }
        }

        function renderModalContent(c) {
            const content = document.getElementById('modalContent');
            const statusLabel = colunas.find(col => col.id === (c.status || 'novo'))?.title || c.status;
            
            // Helper for badge class
            const getBadgeClass = (status) => {
                const map = {
                    'novo': 'badge badge-primary',
                    'visto': 'badge badge-secondary',
                    'entrevista': 'badge badge-warning',
                    'contratado': 'badge badge-success',
                    'rejeitado': 'badge badge-danger'
                };
                return map[status] || 'badge badge-secondary';
            };

            const html = `
                <div class="modal-header">
                    <div class="modal-title">
                        <h2>${c.nome}</h2>
                        <div class="modal-meta">
                            Cadastrado em ${formatDateTimePtBR(c.createdAt)}
                            <span class="${getBadgeClass(c.status || 'novo')}" style="margin-left: 10px;">${statusLabel}</span>
                        </div>
                    </div>
                    <div>
                        <a href="/api/rh/candidatos/${c.id}/curriculo" target="_blank" class="btn btn-primary">📄 Baixar Currículo</a>
                    </div>
                </div>

                <div class="modal-content-wrapper">
                    ${c.status === 'contratado' ? `
                    <div class="detail-card" style="margin-bottom: 16px;">
                        <div class="detail-label" style="margin-bottom: 8px;">Próxima integração</div>
                        <div style="display:flex; gap: 10px; align-items: center; flex-wrap: wrap;">
                            <input type="date" id="proximaIntegracaoInput" value="${(c.proximaIntegracao || '').slice(0,10)}" style="padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg-surface); color: var(--text-primary);">
                            <button class="btn btn-secondary" onclick="salvarProximaIntegracao('${c.id}')">Salvar</button>
                            <div style="font-size: 0.85rem; color: var(--text-secondary);">
                                Atual: <strong>${c.proximaIntegracao ? formatDateYMD(c.proximaIntegracao) : '-'}</strong>
                            </div>
                        </div>
                    </div>
                    ` : ''}
                    <div class="modal-grid">
                        <div>
                            <h3 class="section-title">Dados Pessoais</h3>
                            <div class="detail-group">
                                <div class="detail-label">Email</div>
                                <div class="detail-value">${c.email}</div>
                            </div>
                            <div class="detail-group">
                                <div class="detail-label">Telefone / Recado</div>
                                <div class="detail-value">${c.telefone} ${c.recado ? `/ ${c.recado}` : ''}</div>
                            </div>
                            <div class="detail-group">
                                <div class="detail-label">Idade / Estado Civil</div>
                                <div class="detail-value">${c.idade} anos, ${c.estadoCivil}</div>
                            </div>
                            <div class="detail-group">
                                <div class="detail-label">Endereço</div>
                                <div class="detail-value">${c.endereco}, ${c.bairro} - ${c.cidade}</div>
                            </div>
                            <div class="detail-group">
                                <div class="detail-label">Filhos</div>
                                <div class="detail-value">${c.filhos} (${c.qtdFilhos || 0})</div>
                            </div>
                        </div>

                        <div>
                            <h3 class="section-title">Profissional</h3>
                            <div class="detail-group">
                                <div class="detail-label">Escolaridade</div>
                                <div class="detail-value">${c.escolaridade}</div>
                            </div>
                            <div class="detail-group">
                                <div class="detail-label">Pretensão Salarial</div>
                                <div class="detail-value">${c.salarioPretendido || 'Não informada'}</div>
                            </div>
                            <div class="detail-group">
                                <div class="detail-label">Disponibilidade</div>
                                <div class="detail-value">${c.horario || 'Não informada'}</div>
                            </div>
                            
                            ${c.empresa1 ? `
                            <div class="detail-card">
                                <div class="detail-label" style="margin-bottom:8px;">Última Experiência</div>
                                <div class="detail-value">
                                    <strong style="color:var(--primary);">${c.empresa1}</strong><br>
                                    ${c.cargo1}<br>
                                    <span style="font-size:0.85em; color:var(--text-secondary);">${c.admissao1 || '?'} a ${c.saida1 || '?'}</span>
                                </div>
                            </div>
                            ` : ''}
                        </div>
                    </div>
                </div>

                <div class="modal-actions">
                    <button class="btn btn-danger" onclick="excluirCandidato('${c.id}')">🗑️ Excluir</button>
                    
                    <div class="status-actions">
                        <span style="font-size:0.875rem; color:var(--text-secondary); align-self:center; margin-right:8px;">Mover para:</span>
                        ${c.status !== 'visto' ? `<button class="btn btn-secondary" onclick="mudarStatus('${c.id}', 'visto')">Análise</button>` : ''}
                        ${c.status !== 'entrevista' ? `<button class="btn btn-warning" onclick="mudarStatus('${c.id}', 'entrevista')">Entrevista</button>` : ''}
                        ${c.status !== 'contratado' ? `<button class="btn btn-success" onclick="mudarStatus('${c.id}', 'contratado')">Contratar</button>` : ''}
                        ${c.status !== 'rejeitado' ? `<button class="btn btn-danger" onclick="mudarStatus('${c.id}', 'rejeitado')">Arquivar</button>` : ''}
                    </div>
                </div>
            `;
            
            content.innerHTML = html;
        }

        async function salvarProximaIntegracao(id) {
            const input = document.getElementById('proximaIntegracaoInput');
            const value = input ? input.value : '';
            try {
                const res = await fetch(`/api/rh/candidatos/${id}/status`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ proximaIntegracao: value || null })
                });
                if (!res.ok) {
                    alert('Erro ao salvar próxima integração');
                    return;
                }
                const updatedRes = await fetch(`/api/rh/candidatos/${id}`);
                const updatedC = await updatedRes.json();
                renderModalContent(updatedC);
                carregarCandidatos();
            } catch (e) {
                alert('Erro de conexão');
            }
        }

        async function mudarStatus(id, novoStatus) {
            try {
                const res = await fetch(`/api/rh/candidatos/${id}/status`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status: novoStatus })
                });
                if (res.ok) {
                    // Atualiza localmente e fecha modal ou recarrega
                    // Vamos recarregar o modal para ver a mudança
                    const updatedRes = await fetch(`/api/rh/candidatos/${id}`);
                    const updatedC = await updatedRes.json();
                    renderModalContent(updatedC);
                    // Atualiza lista em background
                    carregarCandidatos(); 
                } else {
                    alert('Erro ao atualizar status');
                }
            } catch (e) {
                alert('Erro de conexão');
            }
        }

        async function excluirCandidato(id) {
            if (!confirm('Tem certeza que deseja excluir este candidato permanentemente?')) return;
            try {
                const res = await fetch(`/api/rh/candidatos/${id}`, { method: 'DELETE' });
                if (res.ok) {
                    fecharModal();
                    carregarCandidatos();
                } else {
                    alert('Erro ao excluir');
                }
            } catch (e) {
                alert('Erro de conexão');
            }
        }

        function fecharModal() {
            document.getElementById('modalDetalhes').style.display = 'none';
        }

        // Close modal on outside click
        document.getElementById('modalDetalhes').addEventListener('click', (e) => {
            if (e.target === document.getElementById('modalDetalhes')) fecharModal();
        });

        // Re-render on language change
        window.addEventListener('languagechange', () => {
            updateColTitles();
            const last = document.getElementById('lastUpdate');
            if (last) last.innerText = t('Atualizado agora');
            filtrarCandidatos();
        });

        // Start
        updateColTitles();
        carregarCandidatos();
    </script>
</body>
</html>
