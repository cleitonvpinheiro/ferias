<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gestão de Formulários - RH</title>
  <link rel="icon" href="/assets/logo.png" type="image/png">
  <link rel="stylesheet" href="/rh-styles.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
  <div id="navbar-container"></div>
  <script src="/rh-navbar.js"></script>
  <script>renderRHNavbar('formularios');</script>

  <main class="dashboard-container">
    <div class="page-header">
        <div>
            <h1 class="page-title">Gestão de Formulários</h1>
            <p class="page-subtitle">Crie e edite formulários de avaliação e pesquisa</p>
        </div>
        <div class="action-buttons">
            <button class="btn btn-primary" onclick="abrirModalCriacao()">
                ➕ Novo Formulário
            </button>
        </div>
    </div>

    <div class="table-container">
        <div class="table-wrapper">
            <table id="tabela-formularios">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Título</th>
                        <th>Tipo</th>
                        <th>Questões</th>
                        <th>Status</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="lista-corpo">
                    <!-- Preenchido via JS -->
                </tbody>
            </table>
        </div>
        <div id="empty-state" class="empty-state" hidden>
            <p>Nenhum formulário encontrado.</p>
        </div>
    </div>
  </main>

  <!-- Modal de Edição/Criação -->
  <div id="modal-form" class="modal-overlay" style="display: none;">
      <div class="modal-content" style="max-width: 800px; width: 90%;">
          <div class="modal-header">
              <h2 id="modal-title">Editar Formulário</h2>
              <button class="close-btn" onclick="fecharModal()">&times;</button>
          </div>
          <div class="modal-body">
              <form id="form-editor" onsubmit="salvarFormulario(event)">
                  <input type="hidden" id="form-id">
                  
                  <div class="form-group">
                      <label>Título do Formulário</label>
                      <input type="text" id="form-titulo" class="form-control" required>
                  </div>

                  <div class="form-group">
                      <label>Tipo</label>
                      <select id="form-tipo" class="form-control">
                          <option value="avaliacao">Avaliação</option>
                          <option value="pesquisa">Pesquisa</option>
                      </select>
                  </div>

                  <div class="form-group">
                      <label>Questões (JSON)</label>
                      <div id="questions-container" style="max-height: 400px; overflow-y: auto; border: 1px solid #ddd; padding: 10px; margin-bottom: 10px;">
                          <!-- Questões serão renderizadas aqui -->
                      </div>
                      <button type="button" class="btn btn-sm btn-outline" onclick="adicionarQuestao()">➕ Adicionar Questão</button>
                  </div>

                  <div class="form-group">
                      <label>
                          <input type="checkbox" id="form-ativo"> Ativo
                      </label>
                  </div>

                  <div class="modal-footer">
                      <button type="button" class="btn btn-outline" onclick="fecharModal()">Cancelar</button>
                      <button type="submit" class="btn btn-primary">Salvar</button>
                  </div>
              </form>
          </div>
      </div>
  </div>

  <style>
      .modal-overlay {
          position: fixed; top: 0; left: 0; width: 100%; height: 100%;
          background: rgba(0,0,0,0.5); z-index: 1000;
          display: flex; justify-content: center; align-items: center;
      }
      .modal-content {
          background: white; padding: 20px; border-radius: 8px;
          box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      }
      .modal-header { display: flex; justify-content: space-between; margin-bottom: 20px; }
      .close-btn { background: none; border: none; font-size: 1.5rem; cursor: pointer; }
      .questao-item {
          background: #f9f9f9; padding: 10px; border: 1px solid #eee; margin-bottom: 10px; border-radius: 4px;
      }
      .questao-header { display: flex; justify-content: space-between; margin-bottom: 5px; }
  </style>

  <script>
    let currentForms = [];
    let editingQuestions = [];

    async function carregarFormularios() {
        const tbody = document.getElementById('lista-corpo');
        tbody.innerHTML = '<tr><td colspan="6">Carregando...</td></tr>';
        
        try {
            const res = await fetch('/api/rh/formularios');
            const data = await res.json();
            currentForms = data;
            
            tbody.innerHTML = '';
            if (data.length === 0) {
                document.getElementById('empty-state').hidden = false;
                document.getElementById('tabela-formularios').hidden = true;
                return;
            }

            document.getElementById('empty-state').hidden = true;
            document.getElementById('tabela-formularios').hidden = false;

            data.forEach(f => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${f.id}</td>
                    <td>${f.titulo}</td>
                    <td>${f.tipo}</td>
                    <td>${f.questoes ? f.questoes.length : 0} questões</td>
                    <td>${f.ativo ? '✅ Ativo' : '❌ Inativo'}</td>
                    <td>
                        <button class="btn btn-sm btn-primary" onclick="editarFormulario('${f.id}')">✏️ Editar</button>
                        <button class="btn btn-sm btn-danger" onclick="excluirFormulario('${f.id}')">🗑️ Excluir</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        } catch (e) {
            console.error(e);
            tbody.innerHTML = '<tr><td colspan="6">Erro ao carregar</td></tr>';
        }
    }

    function abrirModalCriacao() {
        document.getElementById('modal-title').innerText = 'Novo Formulário';
        document.getElementById('form-id').value = '';
        document.getElementById('form-titulo').value = '';
        document.getElementById('form-tipo').value = 'avaliacao';
        document.getElementById('form-ativo').checked = true;
        editingQuestions = [];
        renderizarQuestões();
        document.getElementById('modal-form').style.display = 'flex';
    }

    function editarFormulario(id) {
        const form = currentForms.find(f => f.id === id);
        if (!form) return;

        document.getElementById('modal-title').innerText = 'Editar Formulário';
        document.getElementById('form-id').value = form.id;
        document.getElementById('form-titulo').value = form.titulo;
        document.getElementById('form-tipo').value = form.tipo;
        document.getElementById('form-ativo').checked = form.ativo;
        
        editingQuestions = form.questoes ? JSON.parse(JSON.stringify(form.questoes)) : [];
        renderizarQuestões();
        
        document.getElementById('modal-form').style.display = 'flex';
    }

    function fecharModal() {
        document.getElementById('modal-form').style.display = 'none';
    }

    function renderizarQuestões() {
        const container = document.getElementById('questions-container');
        container.innerHTML = '';
        
        editingQuestions.forEach((q, index) => {
            const div = document.createElement('div');
            div.className = 'questao-item';
            div.innerHTML = `
                <div class="questao-header">
                    <strong>Questão ${index + 1}</strong>
                    <button type="button" class="btn btn-sm btn-danger" onclick="removerQuestao(${index})">Remover</button>
                </div>
                <div class="form-group">
                    <label>Categoria</label>
                    <input type="text" class="form-control" value="${q.category || ''}" onchange="atualizarQuestao(${index}, 'category', this.value)">
                </div>
                <div class="form-group">
                    <label>Pergunta</label>
                    <textarea class="form-control" onchange="atualizarQuestao(${index}, 'question', this.value)">${q.question || ''}</textarea>
                </div>
            `;
            container.appendChild(div);
        });
    }

    function adicionarQuestao() {
        editingQuestions.push({ category: '', question: '' });
        renderizarQuestões();
    }

    function removerQuestao(index) {
        editingQuestions.splice(index, 1);
        renderizarQuestões();
    }

    function atualizarQuestao(index, field, value) {
        editingQuestions[index][field] = value;
    }

    async function salvarFormulario(e) {
        e.preventDefault();
        
        const id = document.getElementById('form-id').value;
        const titulo = document.getElementById('form-titulo').value;
        const tipo = document.getElementById('form-tipo').value;
        const ativo = document.getElementById('form-ativo').checked;

        const payload = {
            titulo,
            tipo,
            ativo,
            questoes: editingQuestions
        };

        try {
            let res;
            if (id) {
                // Update
                res = await fetch(`/api/rh/formularios/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
            } else {
                // Create
                res = await fetch('/api/rh/formularios', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
            }

            if (res.ok) {
                Swal.fire('Sucesso', 'Formulário salvo com sucesso!', 'success');
                fecharModal();
                carregarFormularios();
            } else {
                const err = await res.json();
                Swal.fire('Erro', err.error || 'Erro ao salvar', 'error');
            }
        } catch (e) {
            console.error(e);
            Swal.fire('Erro', 'Erro de conexão', 'error');
        }
    }

    async function excluirFormulario(id) {
        const result = await Swal.fire({
            title: 'Tem certeza?',
            text: "Você não poderá reverter isso!",
            icon: 'warning',
            showCancelButton: true,
            confirmButtonText: 'Sim, excluir!',
            cancelButtonText: 'Cancelar'
        });

        if (result.isConfirmed) {
            try {
                const res = await fetch(`/api/rh/formularios/${id}`, { method: 'DELETE' });
                if (res.ok) {
                    Swal.fire('Excluído!', 'O formulário foi excluído.', 'success');
                    carregarFormularios();
                } else {
                    Swal.fire('Erro', 'Erro ao excluir', 'error');
                }
            } catch (e) {
                Swal.fire('Erro', 'Erro de conexão', 'error');
            }
        }
    }

    document.addEventListener('DOMContentLoaded', carregarFormularios);
  </script>
</body>
</html>
